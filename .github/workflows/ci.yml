name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate shaders
        run: npm run embed-shaders

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build library
        run: npm run build

      - name: Build demo
        run: npm run build:demo

      - name: Unit tests
        run: npm test

  gpu-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate shaders
        run: npm run embed-shaders

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: GPU browser tests
        run: npx playwright test
