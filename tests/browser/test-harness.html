<!DOCTYPE html>
<html>
<head>
  <title>AVBD GPU Test Harness</title>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="results"></div>
  <script type="module">
    import AVBD from '../../src/2d/index.ts';

    window.AVBD = AVBD;
    window.testResults = {};

    // Helper to run a test scenario and store results
    window.runTest = async function(name, fn) {
      try {
        const result = await fn();
        window.testResults[name] = { success: true, ...result };
      } catch (e) {
        window.testResults[name] = { success: false, error: e.message };
      }
    };

    // Initialize
    try {
      await AVBD.init();

      // Probe GPU compute capability
      let adapterInfo = null;
      let computeWorks = false;
      try {
        const adapter = await navigator.gpu.requestAdapter();
        adapterInfo = adapter ? {
          vendor: adapter.info?.vendor || 'unknown',
          architecture: adapter.info?.architecture || 'unknown',
          description: adapter.info?.description || 'unknown',
        } : null;

        // Test that compute shaders actually work
        if (adapter) {
          const device = await adapter.requestDevice();
          const module = device.createShaderModule({
            code: `@group(0) @binding(0) var<storage, read_write> data: array<f32>;
                   @compute @workgroup_size(1)
                   fn main() { data[0] = 42.0; }`
          });
          const layout = device.createBindGroupLayout({
            entries: [{ binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } }]
          });
          const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [layout] }),
            compute: { module, entryPoint: 'main' }
          });
          const buf = device.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
          device.queue.writeBuffer(buf, 0, new Float32Array([0]));
          const staging = device.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
          const bg = device.createBindGroup({ layout, entries: [{ binding: 0, resource: { buffer: buf } }] });
          const enc = device.createCommandEncoder();
          const pass = enc.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bg);
          pass.dispatchWorkgroups(1);
          pass.end();
          enc.copyBufferToBuffer(buf, 0, staging, 0, 4);
          device.queue.submit([enc.finish()]);
          await staging.mapAsync(GPUMapMode.READ);
          const result = new Float32Array(staging.getMappedRange())[0];
          staging.unmap();
          computeWorks = (result === 42.0);
          device.destroy();
        }
      } catch (e) {
        adapterInfo = { error: e.message };
      }

      window.testResults.init = {
        success: true,
        gpuAvailable: AVBD.isGPUAvailable,
        adapterInfo,
        computeWorks,
      };
      document.getElementById('status').textContent =
        `AVBD initialized. GPU: ${AVBD.isGPUAvailable ? 'YES' : 'NO'}, Compute: ${computeWorks}`;
    } catch (e) {
      window.testResults.init = { success: false, error: e.message };
      document.getElementById('status').textContent = `Init failed: ${e.message}`;
    }

    // Auto-run core tests
    await window.runTest('freeFall', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 });
      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      const positions = [];
      for (let i = 0; i < 60; i++) {
        await world.step();
        if (i < 5 || i % 10 === 0) {
          positions.push({ step: i, y: body.translation().y });
        }
      }

      const pos = body.translation();
      // After 1 second of free fall: y ≈ 10 - 0.5 * 9.81 * 1² ≈ 5.1
      return { y: pos.y, expected: 10 - 0.5 * 9.81, isGPU: world.isGPU, positions };
    });

    await window.runTest('boxOnGround', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 10 });
      world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));

      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 3)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      // Also run CPU version for comparison
      const cpuWorld = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 10 });
      cpuWorld.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
      const cpuBody = cpuWorld.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 3)
      );
      cpuWorld.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), cpuBody);

      const trajectory = [];
      const cpuTrajectory = [];
      for (let i = 0; i < 120; i++) {
        await world.step();
        cpuWorld.stepCPU();
        if (i % 20 === 0) {
          trajectory.push({ step: i, y: body.translation().y });
          cpuTrajectory.push({ step: i, y: cpuBody.translation().y });
        }
      }

      const y = body.translation().y;
      const cpuY = cpuBody.translation().y;
      return { y, cpuY, aboveGround: y > 0.3, isGPU: world.isGPU, trajectory, cpuTrajectory };
    });

    await window.runTest('manyBodies', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 5 });
      world.createCollider(AVBD.ColliderDesc.cuboid(20, 0.5));

      const bodies = [];
      for (let i = 0; i < 50; i++) {
        const x = (i % 10) * 1.2 - 5;
        const y = 2 + Math.floor(i / 10) * 1.2;
        const b = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(x, y)
        );
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), b);
        bodies.push(b);
      }

      const start = performance.now();
      for (let i = 0; i < 30; i++) {
        await world.step();
      }
      const elapsed = performance.now() - start;

      // Check all positions are finite
      let allFinite = true;
      for (const b of bodies) {
        const pos = b.translation();
        if (!isFinite(pos.x) || !isFinite(pos.y)) allFinite = false;
      }

      return { elapsed, allFinite, bodyCount: 50, isGPU: world.isGPU };
    });

    // GPU diagnostic test
    await window.runTest('gpuDiagnostic', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 });
      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      // Check body state before step
      const preMass = body.mass();
      const prePos = body.translation();

      // Also test CPU to compare
      const cpuWorld = new AVBD.World({ x: 0, y: -9.81 });
      const cpuBody = cpuWorld.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      cpuWorld.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), cpuBody);
      cpuWorld.stepCPU();
      const cpuAfter = cpuBody.translation();

      // Step GPU
      await world.step();
      const gpuAfter = body.translation();

      // Check: do multiple CPU steps match expected behavior?
      for (let i = 0; i < 59; i++) cpuWorld.stepCPU();
      const cpuAfter60 = cpuBody.translation();

      // Capture console.error for GPU validation errors from solver
      const gpuErrors = [];
      const origConsoleError = console.error;
      console.error = (...args) => { gpuErrors.push(args.join(' ')); origConsoleError.apply(console, args); };

      // Try more GPU steps
      for (let i = 0; i < 59; i++) await world.step();
      const gpuAfter60 = body.translation();

      // Minimal standalone GPU compute test with same pattern as primal shader
      let standaloneResult = -1;
      try {
        const dev = await (await gpu.requestAdapter()).requestDevice();
        dev.pushErrorScope('validation');
        const mod = dev.createShaderModule({ code: `
          struct Params { value: f32, }
          @group(0) @binding(0) var<uniform> params: Params;
          @group(0) @binding(1) var<storage, read_write> output: array<f32>;
          @compute @workgroup_size(1)
          fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
            output[0] = output[0] + params.value;
          }
        `});
        const bgl = dev.createBindGroupLayout({ entries: [
          { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
          { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
        ]});
        const pip = dev.createComputePipeline({
          layout: dev.createPipelineLayout({ bindGroupLayouts: [bgl] }),
          compute: { module: mod, entryPoint: 'main' }
        });
        const paramBuf = dev.createBuffer({ size: 4, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const dataBuf = dev.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
        const stagBuf = dev.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

        dev.queue.writeBuffer(paramBuf, 0, new Float32Array([5.0]));
        dev.queue.writeBuffer(dataBuf, 0, new Float32Array([10.0]));

        const bg = dev.createBindGroup({ layout: bgl, entries: [
          { binding: 0, resource: { buffer: paramBuf } },
          { binding: 1, resource: { buffer: dataBuf } },
        ]});
        const enc = dev.createCommandEncoder();
        const pass = enc.beginComputePass();
        pass.setPipeline(pip);
        pass.setBindGroup(0, bg);
        pass.dispatchWorkgroups(1);
        pass.end();
        enc.copyBufferToBuffer(dataBuf, 0, stagBuf, 0, 4);
        dev.queue.submit([enc.finish()]);
        const validationError = await dev.popErrorScope();
        await stagBuf.mapAsync(GPUMapMode.READ);
        standaloneResult = new Float32Array(stagBuf.getMappedRange())[0];
        stagBuf.unmap();
        dev.destroy();
        if (validationError) gpuErrors.push('validation: ' + validationError.message);
      } catch(e) { gpuErrors.push('standalone: ' + e.message); }

      console.error = origConsoleError;

      return {
        preMass,
        prePos,
        cpuAfter1: cpuAfter,
        gpuAfter1: gpuAfter,
        cpuAfter60,
        gpuAfter60,
        isGPU: world.isGPU,
        gpuErrors,
        standaloneResult,  // should be 15.0 (10+5)
      };
    });

    // Signal completion
    window.testResults._complete = true;
    document.getElementById('status').textContent = 'Tests complete';
    document.getElementById('results').textContent = JSON.stringify(window.testResults, null, 2);
  </script>
</body>
</html>
