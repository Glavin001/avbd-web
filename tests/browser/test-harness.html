<!DOCTYPE html>
<html>
<head>
  <title>AVBD GPU Test Harness</title>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="results"></div>
  <script type="module">
    import AVBD from '../../src/2d/index.ts';
    import AVBD3D from '../../src/3d/index.ts';

    window.AVBD = AVBD;
    window.AVBD3D = AVBD3D;
    window.testResults = {};

    // Helper to run a test scenario and store results
    window.runTest = async function(name, fn) {
      try {
        const result = await fn();
        window.testResults[name] = { success: true, ...result };
      } catch (e) {
        window.testResults[name] = { success: false, error: e.message };
      }
    };

    // ─── Helper: run GPU and CPU in parallel, record full trajectory ────
    async function gpuCpuRun(setupFn, steps, opts = {}) {
      const iters = opts.iterations || 10;
      const gpuWorld = new AVBD.World({ x: 0, y: -9.81 }, { iterations: iters });
      const cpuWorld = new AVBD.World({ x: 0, y: -9.81 }, { iterations: iters });
      const gpuHandles = setupFn(gpuWorld);
      const cpuHandles = setupFn(cpuWorld);
      const gpuTrajectory = [];
      const cpuTrajectory = [];
      for (let i = 0; i < steps; i++) {
        await gpuWorld.step();
        cpuWorld.stepCPU();
        gpuTrajectory.push(gpuHandles.map(b => ({ ...b.translation() })));
        cpuTrajectory.push(cpuHandles.map(b => ({ ...b.translation() })));
      }
      return {
        gpuTrajectory, cpuTrajectory,
        gpuFinal: gpuHandles.map(b => b.translation()),
        cpuFinal: cpuHandles.map(b => b.translation()),
        isGPU: gpuWorld.isGPU,
      };
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Initialize
    // ═══════════════════════════════════════════════════════════════════════
    try {
      await AVBD.init();

      let adapterInfo = null;
      let computeWorks = false;
      try {
        const adapter = await navigator.gpu.requestAdapter();
        adapterInfo = adapter ? {
          vendor: adapter.info?.vendor || 'unknown',
          architecture: adapter.info?.architecture || 'unknown',
          description: adapter.info?.description || 'unknown',
        } : null;

        if (adapter) {
          const device = await adapter.requestDevice();
          const module = device.createShaderModule({
            code: `@group(0) @binding(0) var<storage, read_write> data: array<f32>;
                   @compute @workgroup_size(1)
                   fn main() { data[0] = 42.0; }`
          });
          const layout = device.createBindGroupLayout({
            entries: [{ binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } }]
          });
          const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [layout] }),
            compute: { module, entryPoint: 'main' }
          });
          const buf = device.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
          device.queue.writeBuffer(buf, 0, new Float32Array([0]));
          const staging = device.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
          const bg = device.createBindGroup({ layout, entries: [{ binding: 0, resource: { buffer: buf } }] });
          const enc = device.createCommandEncoder();
          const pass = enc.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bg);
          pass.dispatchWorkgroups(1);
          pass.end();
          enc.copyBufferToBuffer(buf, 0, staging, 0, 4);
          device.queue.submit([enc.finish()]);
          await staging.mapAsync(GPUMapMode.READ);
          const result = new Float32Array(staging.getMappedRange())[0];
          staging.unmap();
          computeWorks = (result === 42.0);
          device.destroy();
        }
      } catch (e) {
        adapterInfo = { error: e.message };
      }

      window.testResults.init = {
        success: true,
        gpuAvailable: AVBD.isGPUAvailable,
        adapterInfo,
        computeWorks,
      };
      document.getElementById('status').textContent =
        `AVBD initialized. GPU: ${AVBD.isGPUAvailable ? 'YES' : 'NO'}, Compute: ${computeWorks}`;
    } catch (e) {
      window.testResults.init = { success: false, error: e.message };
      document.getElementById('status').textContent = `Init failed: ${e.message}`;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 1: Free fall — analytical validation
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('freeFall', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 });
      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      const positions = [];
      for (let i = 0; i < 60; i++) {
        await world.step();
        positions.push({ step: i, y: body.translation().y });
      }

      const finalY = body.translation().y;
      // Analytical: y = 10 - 0.5 * 9.81 * 1² ≈ 5.095
      const analytical = 10 - 0.5 * 9.81;
      return {
        y: finalY,
        analytical,
        error: Math.abs(finalY - analytical),
        isGPU: world.isGPU,
        positions,
        // Verify every step is monotonically decreasing (no upward glitches)
        monotonic: positions.every((p, i) => i === 0 || p.y < positions[i-1].y),
        // x should stay at 0 (no horizontal drift)
        xDrift: Math.abs(body.translation().x),
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 2: Box on ground — contact constraint validation
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('boxOnGround', async () => {
      const r = await gpuCpuRun((world) => {
        // Static ground: cuboid(10, 0.5) centered at (0,0), top surface at y=0.5
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        // Dynamic box at y=3, half-height 0.5 → rests at y≈1.0
        const body = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(0, 3)
        );
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);
        return [body];
      }, 120);

      // Ground surface is at y=0.5, box half-height=0.5 → resting y≈1.0
      const gpuMinY = Math.min(...r.gpuTrajectory.map(t => t[0].y));
      const cpuMinY = Math.min(...r.cpuTrajectory.map(t => t[0].y));
      return {
        gpuFinalY: r.gpuFinal[0].y,
        cpuFinalY: r.cpuFinal[0].y,
        gpuMinY, cpuMinY,
        isGPU: r.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 3: GPU vs CPU step-1 precision — must be near-identical
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('gpuCpuStep1', async () => {
      const r = await gpuCpuRun((world) => {
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        const body = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
        );
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);
        return [body];
      }, 1);

      const gpuY = r.gpuTrajectory[0][0].y;
      const cpuY = r.cpuTrajectory[0][0].y;
      return {
        gpuY, cpuY,
        diff: Math.abs(gpuY - cpuY),
        isGPU: r.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 4: Restitution — bouncing ball must bounce higher with higher e
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('restitution', async () => {
      async function dropBall(restitution) {
        const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 10 });
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        const body = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(0, 5)
        );
        world.createCollider(
          AVBD.ColliderDesc.cuboid(0.5, 0.5).setRestitution(restitution), body
        );

        let maxYAfterBounce = -Infinity;
        let hitGround = false;
        for (let i = 0; i < 180; i++) {
          await world.step();
          const y = body.translation().y;
          if (y < 1.5) hitGround = true;
          if (hitGround && y > 1.5) maxYAfterBounce = Math.max(maxYAfterBounce, y);
        }
        return { finalY: body.translation().y, maxYAfterBounce, hitGround };
      }

      const low = await dropBall(0.2);
      const high = await dropBall(0.7);
      return {
        lowE: low, highE: high,
        // Higher restitution should bounce higher (or at least not less)
        higherBounce: high.maxYAfterBounce >= low.maxYAfterBounce,
        // Both should have hit ground
        bothHitGround: low.hitGround && high.hitGround,
        // Both should rest above ground at the end
        lowAboveGround: low.finalY > 0.5,
        highAboveGround: high.finalY > 0.5,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 5: Friction — GPU vs CPU friction comparison
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('friction', async () => {
      // Give box an initial horizontal velocity and drop onto ground
      function makeFrictionWorld(mu) {
        return (world) => {
          world.createCollider(AVBD.ColliderDesc.cuboid(20, 0.5));
          const body = world.createRigidBody(
            AVBD.RigidBodyDesc.dynamic().setTranslation(0, 1.5).setLinvel(5, 0)
          );
          world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5).setFriction(mu), body);
          return [body];
        };
      }

      const highMu = await gpuCpuRun(makeFrictionWorld(0.8), 120);
      const lowMu = await gpuCpuRun(makeFrictionWorld(0.05), 120);

      return {
        // CPU friction must differentiate mu values
        cpuHighX: highMu.cpuFinal[0].x,
        cpuLowX: lowMu.cpuFinal[0].x,
        cpuFrictionWorks: lowMu.cpuFinal[0].x > highMu.cpuFinal[0].x,
        // GPU friction execution (may not differentiate — known dual shader issue)
        gpuHighX: highMu.gpuFinal[0].x,
        gpuLowX: lowMu.gpuFinal[0].x,
        gpuFrictionDiff: Math.abs(lowMu.gpuFinal[0].x - highMu.gpuFinal[0].x),
        // Both GPU runs should remain above ground (contact working)
        gpuHighAbove: highMu.gpuFinal[0].y > 0.5,
        gpuLowAbove: lowMu.gpuFinal[0].y > 0.5,
        // Both should have moved rightward (velocity integration working)
        gpuHighMoved: highMu.gpuFinal[0].x > 0,
        gpuLowMoved: lowMu.gpuFinal[0].x > 0,
        isGPU: highMu.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 6: Stacking — 5 boxes must settle in order
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('stacking', async () => {
      const r = await gpuCpuRun((world) => {
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        const bodies = [];
        for (let i = 0; i < 5; i++) {
          const b = world.createRigidBody(
            AVBD.RigidBodyDesc.dynamic().setTranslation(0, 1.5 + i * 1.1)
          );
          world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), b);
          bodies.push(b);
        }
        return bodies;
      }, 180);

      const gpuYs = r.gpuFinal.map(p => p.y);
      const cpuYs = r.cpuFinal.map(p => p.y);
      return {
        gpuYs, cpuYs,
        // All GPU boxes above ground surface (y=0.5)
        allGpuAbove: gpuYs.every(y => y > 0.5),
        allCpuAbove: cpuYs.every(y => y > 0.5),
        // GPU stack maintains ordering (bottom < middle < top)
        gpuOrdered: gpuYs[0] < gpuYs[1] && gpuYs[1] < gpuYs[2],
        cpuOrdered: cpuYs[0] < cpuYs[1] && cpuYs[1] < cpuYs[2],
        isGPU: r.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 7: Circle/ball collision on GPU
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('circleOnGround', async () => {
      const r = await gpuCpuRun((world) => {
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        const ball = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(0, 5)
        );
        world.createCollider(AVBD.ColliderDesc.ball(0.5), ball);
        return [ball];
      }, 120);

      // Ball radius=0.5, ground top=0.5 → resting y≈1.0
      return {
        gpuY: r.gpuFinal[0].y,
        cpuY: r.cpuFinal[0].y,
        isGPU: r.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 8: Joint pendulum — GPU constraint execution
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('jointPendulum', async () => {
      const r = await gpuCpuRun((world) => {
        const anchor = world.createRigidBody(AVBD.RigidBodyDesc.fixed().setTranslation(0, 5));
        world.createCollider(AVBD.ColliderDesc.cuboid(0.1, 0.1), anchor);
        const bob = world.createRigidBody(AVBD.RigidBodyDesc.dynamic().setTranslation(2, 5));
        world.createCollider(AVBD.ColliderDesc.cuboid(0.3, 0.3), bob);
        world.createJoint(
          AVBD.JointData.revolute({ x: 0, y: 0 }, { x: -2, y: 0 }),
          anchor, bob
        );
        return [bob];
      }, 120);

      // CPU distance from anchor (0,5)
      const cpuP = r.cpuFinal[0];
      const cpuDist = Math.sqrt(cpuP.x * cpuP.x + (cpuP.y - 5) * (cpuP.y - 5));
      // GPU distance
      const gpuP = r.gpuFinal[0];
      const gpuDist = Math.sqrt(gpuP.x * gpuP.x + (gpuP.y - 5) * (gpuP.y - 5));
      // Track distance drift over time
      const gpuDistPerStep = r.gpuTrajectory.map(t => Math.sqrt(t[0].x * t[0].x + (t[0].y - 5) * (t[0].y - 5)));
      const maxGpuDist = Math.max(...gpuDistPerStep);

      return {
        cpuDist, gpuDist,
        cpuPos: cpuP, gpuPos: gpuP,
        maxGpuDist,
        isGPU: r.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 9: Applied force — GPU must respond to forces
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('appliedForce', async () => {
      const world = new AVBD.World({ x: 0, y: 0 }, { iterations: 10 }); // No gravity
      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 0)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      // Apply a rightward impulse
      body.applyImpulse({ x: 10, y: 0 });

      const positions = [];
      for (let i = 0; i < 30; i++) {
        await world.step();
        positions.push({ x: body.translation().x, y: body.translation().y });
      }

      return {
        finalX: body.translation().x,
        finalY: body.translation().y,
        isGPU: world.isGPU,
        // Body should move right
        movedRight: body.translation().x > 0,
        // Y should stay near zero (no gravity)
        yNearZero: Math.abs(body.translation().y) < 0.1,
        // X should be monotonically increasing (constant velocity, no friction in air)
        xMonotonic: positions.every((p, i) => i === 0 || p.x >= positions[i-1].x - 0.001),
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 10: 200-body stress test
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('stress200', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 5 });
      world.createCollider(AVBD.ColliderDesc.cuboid(30, 0.5));

      const bodies = [];
      for (let i = 0; i < 200; i++) {
        const x = (i % 20) * 1.2 - 12;
        const y = 2 + Math.floor(i / 20) * 1.2;
        const b = world.createRigidBody(
          AVBD.RigidBodyDesc.dynamic().setTranslation(x, y)
        );
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), b);
        bodies.push(b);
      }

      const start = performance.now();
      for (let i = 0; i < 60; i++) {
        await world.step();
      }
      const elapsed = performance.now() - start;

      let nanCount = 0;
      let belowGround = 0;
      let maxY = -Infinity;
      for (const b of bodies) {
        const pos = b.translation();
        if (!isFinite(pos.x) || !isFinite(pos.y)) nanCount++;
        if (pos.y < 0) belowGround++;
        maxY = Math.max(maxY, pos.y);
      }

      return {
        elapsed, nanCount, belowGround, maxY,
        bodyCount: 200,
        isGPU: world.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 11: GPU determinism — two identical runs must produce same result
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('determinism', async () => {
      async function runSim() {
        const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 10 });
        world.createCollider(AVBD.ColliderDesc.cuboid(10, 0.5));
        const b1 = world.createRigidBody(AVBD.RigidBodyDesc.dynamic().setTranslation(-1, 3));
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), b1);
        const b2 = world.createRigidBody(AVBD.RigidBodyDesc.dynamic().setTranslation(1, 5));
        world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), b2);

        for (let i = 0; i < 60; i++) await world.step();
        return { b1: b1.translation(), b2: b2.translation() };
      }

      const run1 = await runSim();
      const run2 = await runSim();

      return {
        run1, run2,
        b1YDiff: Math.abs(run1.b1.y - run2.b1.y),
        b2YDiff: Math.abs(run1.b2.y - run2.b2.y),
        b1XDiff: Math.abs(run1.b1.x - run2.b1.x),
        b2XDiff: Math.abs(run1.b2.x - run2.b2.x),
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 12: Multi-body collision — two boxes collide mid-air
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('midAirCollision', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 }, { iterations: 10 });

      // Two boxes approaching each other
      const left = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(-3, 5).setLinvel(5, 0)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), left);

      const right = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(3, 5).setLinvel(-5, 0)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), right);

      // Capture pre-collision approach
      let collisionDetected = false;
      let preCollisionGap = Infinity;
      for (let i = 0; i < 60; i++) {
        await world.step();
        const lx = left.translation().x;
        const rx = right.translation().x;
        const gap = rx - lx - 1.0; // subtract box width
        if (gap < preCollisionGap) preCollisionGap = gap;
        // After collision, boxes should reverse or stop
        if (gap < 0.1 && !collisionDetected) collisionDetected = true;
      }

      const lFinal = left.translation();
      const rFinal = right.translation();
      return {
        leftX: lFinal.x, rightX: rFinal.x,
        leftY: lFinal.y, rightY: rFinal.y,
        collisionDetected,
        // Boxes should not pass through each other
        noOverlap: rFinal.x > lFinal.x,
        // Both finite
        finite: isFinite(lFinal.x) && isFinite(rFinal.x) && isFinite(lFinal.y) && isFinite(rFinal.y),
        isGPU: world.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 13: Empty world step — must not crash
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('emptyWorld', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 });
      await world.step();
      await world.step();
      await world.step();
      return { stepped: true, isGPU: world.isGPU };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // TEST 14: GPU readback correctness — buffer round-trip validation
    // ═══════════════════════════════════════════════════════════════════════
    await window.runTest('gpuReadback', async () => {
      const world = new AVBD.World({ x: 0, y: -9.81 });
      const body = world.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      world.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), body);

      // CPU reference
      const cpuWorld = new AVBD.World({ x: 0, y: -9.81 });
      const cpuBody = cpuWorld.createRigidBody(
        AVBD.RigidBodyDesc.dynamic().setTranslation(0, 10)
      );
      cpuWorld.createCollider(AVBD.ColliderDesc.cuboid(0.5, 0.5), cpuBody);

      // Step 1: GPU and CPU should be nearly identical
      await world.step();
      cpuWorld.stepCPU();
      const gpu1 = body.translation();
      const cpu1 = cpuBody.translation();
      const diff1 = Math.abs(gpu1.y - cpu1.y);

      // Step 60: accumulation of f32 vs f64 differences
      for (let i = 1; i < 60; i++) {
        await world.step();
        cpuWorld.stepCPU();
      }
      const gpu60 = body.translation();
      const cpu60 = cpuBody.translation();
      const diff60 = Math.abs(gpu60.y - cpu60.y);

      return {
        gpu1Y: gpu1.y, cpu1Y: cpu1.y, diff1,
        gpu60Y: gpu60.y, cpu60Y: cpu60.y, diff60,
        isGPU: world.isGPU,
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // 3D GPU Tests
    // ═══════════════════════════════════════════════════════════════════════

    try {
      await AVBD3D.init();
    } catch (e) {
      // 3D init might fail if GPU is not available
    }

    // 3D Free Fall
    await window.runTest('freeFall3D', async () => {
      const world = new AVBD3D.World3D({ x: 0, y: -9.81, z: 0 });
      const body = world.createRigidBody(AVBD3D.RigidBodyDesc3D.dynamic().setTranslation(0, 10, 0));
      world.createCollider(AVBD3D.ColliderDesc3D.cuboid(0.5, 0.5, 0.5), body);

      for (let i = 0; i < 60; i++) await world.step();

      const expected = 10 - 0.5 * 9.81 * 1;
      const y = body.translation().y;
      const error = Math.abs(y - expected);
      return { y, expected, error, isGPU: true };
    });

    // 3D Box on Ground
    await window.runTest('boxOnGround3D', async () => {
      const world = new AVBD3D.World3D({ x: 0, y: -9.81, z: 0 });
      world.createCollider(AVBD3D.ColliderDesc3D.cuboid(10, 0.5, 10));
      const body = world.createRigidBody(AVBD3D.RigidBodyDesc3D.dynamic().setTranslation(0, 5, 0));
      world.createCollider(AVBD3D.ColliderDesc3D.cuboid(0.5, 0.5, 0.5), body);

      let minY = Infinity;
      for (let i = 0; i < 180; i++) {
        await world.step();
        minY = Math.min(minY, body.translation().y);
      }
      const finalY = body.translation().y;
      return { minY, finalY, isGPU: true };
    });

    // 3D Stack
    await window.runTest('stack3D', async () => {
      const world = new AVBD3D.World3D({ x: 0, y: -9.81, z: 0 }, { iterations: 15 });
      world.createCollider(AVBD3D.ColliderDesc3D.cuboid(10, 0.5, 10));
      const bodies = [];
      for (let i = 0; i < 3; i++) {
        const b = world.createRigidBody(
          AVBD3D.RigidBodyDesc3D.dynamic().setTranslation(0, 1.5 + i * 1.1, 0)
        );
        world.createCollider(AVBD3D.ColliderDesc3D.cuboid(0.5, 0.5, 0.5), b);
        bodies.push(b);
      }

      for (let i = 0; i < 180; i++) await world.step();

      const ys = bodies.map(b => b.translation().y);
      const allAboveGround = ys.every(y => y > 0.3);
      const ordered = ys[0] < ys[1] && ys[1] < ys[2];
      return { ys, allAboveGround, ordered, isGPU: true };
    });

    // 3D GPU vs CPU parity
    await window.runTest('gpuCpuParity3D', async () => {
      // GPU
      const gpuWorld = new AVBD3D.World3D({ x: 0, y: -9.81, z: 0 });
      const gpuBody = gpuWorld.createRigidBody(
        AVBD3D.RigidBodyDesc3D.dynamic().setTranslation(0, 10, 0)
      );
      gpuWorld.createCollider(AVBD3D.ColliderDesc3D.cuboid(0.5, 0.5, 0.5), gpuBody);

      // CPU
      const cpuWorld = new AVBD3D.World3D({ x: 0, y: -9.81, z: 0 }, { useCPU: true });
      const cpuBody = cpuWorld.createRigidBody(
        AVBD3D.RigidBodyDesc3D.dynamic().setTranslation(0, 10, 0)
      );
      cpuWorld.createCollider(AVBD3D.ColliderDesc3D.cuboid(0.5, 0.5, 0.5), cpuBody);

      await gpuWorld.step();
      cpuWorld.step();
      const diff1 = Math.abs(gpuBody.translation().y - cpuBody.translation().y);

      for (let i = 0; i < 59; i++) {
        await gpuWorld.step();
        cpuWorld.step();
      }
      const diff60 = Math.abs(gpuBody.translation().y - cpuBody.translation().y);

      return { diff1, diff60, gpuY: gpuBody.translation().y, cpuY: cpuBody.translation().y, isGPU: true };
    });

    // Signal completion
    window.testResults._complete = true;
    document.getElementById('status').textContent = 'Tests complete';
    document.getElementById('results').textContent = JSON.stringify(window.testResults, null, 2);
  </script>
